name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            use_zigbuild: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            use_zigbuild: true
          - target: x86_64-apple-darwin
            os: macos-latest
            use_zigbuild: false
          - target: aarch64-apple-darwin
            os: macos-latest
            use_zigbuild: false
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            use_zigbuild: false

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Zig
        if: matrix.use_zigbuild
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.13.0

      - name: Install cargo-zigbuild
        if: matrix.use_zigbuild
        run: cargo install cargo-zigbuild --locked

      - name: Build (zigbuild)
        if: matrix.use_zigbuild
        run: cargo zigbuild --release --bin seam --target ${{ matrix.target }}

      - name: Build (native)
        if: '!matrix.use_zigbuild'
        run: cargo build --release --bin seam --target ${{ matrix.target }}

      - name: Package tarball
        shell: bash
        run: |
          if [[ "${{ matrix.target }}" == *windows* ]]; then
            BINARY=target/${{ matrix.target }}/release/seam.exe
            NAME=seam.exe
          else
            BINARY=target/${{ matrix.target }}/release/seam
            NAME=seam
          fi
          TARBALL=seam-${{ matrix.target }}.tar.gz
          tar -czf "$TARBALL" -C "$(dirname $BINARY)" "$NAME"
          echo "TARBALL=$TARBALL" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: seam-${{ matrix.target }}
          path: ${{ env.TARBALL }}
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum seam-*.tar.gz > checksums.sha256
          cat checksums.sha256

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/seam-*.tar.gz
            artifacts/checksums.sha256
          generate_release_notes: true
